front:
  text: 古易考原卷之一給四伏羲卦畫之一
  hash: sha256:0aaa5fdc9a49aa9339dec0aa18011dfa0e3e7d21b22efee2ca4fc2f2dd7d65b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0043_HFL_001-001a, image: hfl/1100/1100-004.png}
body:
  text: 夫子曰卦之德方以知知以藏往又曰易與天地準故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀又曰鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能凡此皆言伏羲卦畫之易也惟其先作方知之卦畫而藏天地萬物已往之理于其中夫然後著策之易可得而用也三代之易皆發明伏羲蓍策之易以為尚占之用未有及于卦畫之易也及于卦畫之易者夫子一人而已故吾作考原之書首之以伏羲卦畫之易者蓋述夫子之意也後儒不知此誼乃曰周易晚添祖父何其無本原冠冕之思也哉始作八卦第一下繫辭曰古者包羲氏之王天下也仰則觀于天文俯則察于地法觀鳥獸之文與地之宣近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情鷟曰仰觀象于天而作卦如乾天離日震雷巽風坎月雲豐斗沫之類俯觀法于地而作卦如坤地兊澤艮山坎水之類觀鳥獸之文如乾為龍為良馬老馬坤為子母牛震為龍為馬善鳴巽為雞坎為豕為馬美脊離為牛為雉為蟹為虎豹艮為狗鼠兊為羊之類觀地之宜以作卦如乾為木果震為蒼筤竹萑葦稼為反生為蕃鮮巽為木為楊坎木為堅多心棟叢棘蒺藜離木為科上稿艮木為堅多節之類近取諸身不但八體而已凡八屬皆是如為君為父之類遠取諸物不但服食器用而已雖計物之數曰萬皆是如為圜玉金寒冰大赤之類伏羲經卦八其别六十有四今止云作八卦者舉經以該别也曷為謂之舉經以該别乾為經卦舉一乾乾之乾而兊乾離乾震乾巽乾坎乾艮乾坤乾八别之乾皆該之矣兊以下七卦皆然故乾夬大有大壯小畜需大畜泰曰始作乾履兊暌歸妹中孚節損臨曰始作兊同人革離豐家人既濟賁明夷曰始作離無妄隨噬嗑震益屯頤復曰始作震姤大過鼎恆巽井蠱升曰始作巽訟困未濟解涣坎蒙師曰始作坎遁咸旅小過漸蹇艮謙曰始作艮否萃晉豫觀比剝坤曰始作坤羲聖心胸天象地法動動植植近身遠物莫不蟠蓄于中然後作八卦以垂示天下後世故其卦之妙天地象法動植身物萬理咸備於是幽贊神明而生著以通神明之德制器尚象隨取隨足以類萬物之情漢儒以為則河圖而畫卦宋儒以為見兔亦可以畫卦皆出于臆説不見伏羲之精未窺夫子之旨者也至其甚者則有以為止作三畫之八卦文王重為六十四卦吾毅然皆以為非是者正以此也今列其圖于左坤上乾下仍名曰乾鷟四此經卦之乾也離下兊上名曰夬乾下離上名曰大有乾下震上名曰大壯乾下巽上名曰小畜乾下坎上名曰需乾下艮上名曰大畜乾下離上名曰泰鷟曰自乾卦以下至泰為其别之乾也鷟曰此以上八卦言伏羲始作乾卦也經卦之乾謂之始作乾宜矣其别卦而皆謂之作乾何哉乾在下為主于內加八卦于上以發明乾之别而已故總名之曰作乾而乾在他卦之上則不為主而為他卦之别兊下乾上名曰履兊下兊上仍名曰兊鷟曰此經卦之兊也兊下離上名曰暌兊下震上名曰歸妹兊下巽上名曰中孚兊下坎上名曰節兊下艮上名曰損兊下坤上名曰臨鷟曰自履以下至臨為其刖之兊也鷟曰此以上八卦言伏羲始作兊卦也經卦之兊謂之始作兊宜矣其别卦而皆謂之作兊何哉兊在下為主于內加八卦于上以發明兊之别而已故總名之曰作兊而兊在他卦之上則不為主而為他卦之别乾下離上名曰同人離下兊上名曰革離下離上仍名曰離鷟曰此經卦之離也離下震上名曰豐離下巽上名曰家人離下坎上名曰既濟離下艮上名曰實離下坤上名曰明夷鷟曰自同人至明夷為其别之離也鷟曰此以上八卦言伏羲始作兊卦也經卦之兊謂之始作離宜矣其别卦而皆謂之作兊何哉兊在下為主于內加八卦于上以發明兊之别而已故總名之曰作離而離在他卦之上則不為主而為他卦之別巽下乾上名曰姤巽下兊上名曰大過巽下離上名曰鼎巽下震上名曰恆巽下巽上仍名曰巽鷟曰此經卦之巽也巽下坎上名曰井巽下艮上名曰蠱巽下坤上名曰升鷟曰自姤以下至升為其别之巽也鷟曰此以上八卦言伏羲始作巽卦也經卦之巽謂之始作巽宜矣其别卦而皆謂之作巽何哉巽在下為主于內加八卦于上以發明巽之别而已故總名之曰作巽而巽在他卦之上則不為主而為他卦之别坎下乾上名曰訟坎下兊上名曰困坎下離上名曰未濟坎下震上名曰解坎下巽上名曰涣坎下坎上仍名曰坎鷟曰此經卦之坎也坎下艮上名曰蒙坎下坤上名曰師鷟曰自訟以下至師為其别之坎也鷟曰此以上八卦言伏義始作坤卦也經卦之坎謂之始作坤宜矣其别卦而皆謂之作坎何哉坤在下為主于內加八卦于上以發明坤之别而已故總名之曰作坎而坎在他卦之上則不為主而為他卦之别艮下乾上名曰遁艮下兊上名曰咸艮下離上名曰旅艮下震上名曰小過艮下巽上名曰漸艮下坎上名曰蹇艮下艮上仍名曰艮鷟曰此經卦之艮也艮下坤上名曰謙鷟曰自遁以下至謙為其别之艮也鷟曰此以上八卦言伏羲始作艮卦也經卦之艮謂之始作艮宜矣其别卦而皆謂之作艮何哉艮在下為主于內加八卦于上以發明艮之别而已故總名之曰作艮而艮在他卦之上則不為主而為他卦之别坤下乾上名曰否坤下兊上名曰萃坤下離上名曰晉坤下震上名曰豫坤下巽上名曰觀坤下巽上名曰此坤下巽上名曰剝坤下巽上名曰坤坤下巽上仍名曰坤鷟曰此經卦之坤也又曰自否以下至坤為其别之坤也鷟曰此以上八卦言伏義始作坤卦也經卦之坤謂之始作坤冝矣其别卦而皆謂之作坤何哉坤在下為主于內加八卦于上以發明坤之别而已故總名之曰作坤而坤在他卦之上則不為主而為他卦之别八卦圓運第二説卦曰天地定位山澤通氣雷風相薄水火不相射又曰數往者順鷟曰此言伏羲六十四卦圓運之圖止言八卦之象者皆舉經以該别也天定位于南其别八天皆定位於南地定位於北其别八地皆定位於北山通氣於西北其别八山皆通氣於西北澤通氣於東南其别八澤皆通氣於東南雷相薄於東北其别八雷皆相薄於東北風相薄於西南其别八風皆相薄於西南水不相射於西其别八水皆不相射於西火不相射於東其别八火皆不相射於東不著卦名者以夫子恆言象故也先儒以為單言三畫之八卦非是其所以為數往者順何也天位於南由南而左行則天而澤而火而雷由南而右行則風而水而山而地皆自南而北自上而下故曰數已往之定位順而不逆從古及今皆如是也八卦方列第三説卦曰八卦相錯知來者逆是故易逆數也又曰雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之鷟曰此言伏羲六十四卦方列之圖止言八卦者亦舉經以該别也八卦相錯承上文天地山澤雷風水火之圓運令彼此交錯而為方列也邵堯夫以上文八卦為三畫卦至此相錯則八卦之上各加八卦而始為六十四卦是以相錯為相重也凡此往彼來謂之錯加增其上謂之重以相錯即為相重誤矣不然則此言雷以動之八卦之方列者無相錯之文是圓運者兼及六畫卦而方列者僅有三畫卦其不通亦明矣雷以動物於中左風以散物於中右其别八雷皆動物於中左八風皆散物於中右也雨以潤物於次風日以暄物於次雷其别八雨皆潤物次風八日皆暄物次雷也艮以止物次雨兊以説物次日其别八艮皆止物次雨八兊皆説物次日也乾以君物居北坤以藏物居南其别八乾皆以君物居北八坤皆以藏物居南也卦位相對雖與上文同先後次第大與上文交錯矣上文天地居首此離坎居中乾坤殿後是天地與水火交錯也上文山澤居第二此艮兊居第三是山澤與雷風相交錯上文雷風居第二此居其中是雷風與天地相交錯也上文水火居第四此雨日居二是水火與山澤相交錯也又分而言之天南地北今乾北坤南是乾與坤相交錯也澤東南山西北今兊次北艮次南是兊與艮相交錯也火東水西今日又次北雨又次南是離與坎相交錯也雷東北風西南今雷動北中風散南中是震與巽相交錯也由乾而兊而離而震而巽而坎而艮而坤皆自北而南自下而上故曰知來者逆也因上文八卦相錯一句渾成未詳故詳列此八句以發明方列相錯之義也然則先儒皆以圓運之乾兊離震為數往者順坤艮坎巽為知來者逆其説不通夫伏羲之卦序乾至坤八未嘗有順也夫子之意借圖運之順方列之逆以發明繫辭知以藏往神以知來之義耳今列其圖于左伏羲六十四卦方圖鷟曰儒者言祕于方技家至陳希夷始傳之邵堯夫始發明之斯言殆不思之甚矣夫子之言昭如日星但伏羲原用卦夫子則言象以發揮是以不思則不得其精也鷟故詳列其圖于左方使後之人知方技家之所祕者出于夫子之言而無所疑也若夫以三畫卦畫為方位圖者則非伏羲之本真而夫子亦初無是言今則刪之不以惑後人也此二圖有隂陽對待之義圓為陽方為隂圓動為天方靜為地鷟曰自天天至地天八卦言天定位于南自天地至地地八卦言地定位于北天山至地山八卦言山通氣于西北天澤至地澤八卦言澤通氣于東南天雷至地雷八卦言雷相薄于東北天風至地風八卦言風相薄于西南天火至地火八卦言火不相射于東天水至地水八卦言水不相射于西此六十四卦之圓皆自南而北自上而下故曰順雷八卦以動物風八卦以散物生物之春也雨八卦以潤物日八卦以烜物長物之夏也艮八卦以止物兊八卦以説物收物之秋也乾八卦以君物坤八卦以藏物藏物之冬也此六十四卦之方列皆自北而南自下而上故曰逆邵子所傳先天之圖其原蓋出于此以上首橫圖次圓圖次方圖伏義卦畫之易可考如此
