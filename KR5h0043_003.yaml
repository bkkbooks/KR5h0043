body:
  text: 易者六聖人之書也其原出于伏羲始畫八卦八卦之上各加八卦因而别之爲六十四卦三畫伏羲之乾字也外加之以三畫注曰乾下乾上而仍名曰乾餘七卦皆然是爲經卦八至於乾上加以兊既不可以乾名又不可以兊名名之曰夬此乾别之一也乾之别九有八餘七卦之别皆然是爲其别六十有四六十四卦之名伏羲始制之字也六十四卦之稱伏義始呼之聲也世更數代人更數聖而卒莫敢有移易羲聖之筆畫形體與夫當時之稱呼聲音也伏羲文字辟猶人家之一祖統宗而散爲億萬之子孫无窮者乎夏商聖人曰禹曰湯周聖人曰文王曰周公曰孔子互相發明而伏羲之經流行于萬古五聖人之功爲多矣但各以趣之所自得者爲書故其書或首艮或首坤或首乾而周公孔子者全宗周易而發揮之伏羲之易簡質而微妙无窮包乎三代之文章者也三代之經宏闊而玄妙无窮互相發明乎羲經者也羲經其太和元氣之流行於四時者乎三代其猶春夏秋冬之各專一時者乎夏易孔氏曰古者有連山氏今夏易名連山蓋用連山氏之易也古注曰連山者象山之出雲連連不絶也愚以爲此注未妥本文无雲字安得書雲連連不絶哉艮大象曰兼山艮亦豈可謂山與雲相兼而有哉蓋艮爲山羲皇以來即有此象夏易首艮故取山重卦艮下艮上仍名艮故曰連山内既有山外復有山相連不絶也若增以出雲則爲别意非復正義矣大象言兼山與連山實一揆也夏易之可見者獨此名書與首艮二端而已其六十四卦之序今皆不可考矣鷟曰易云探頤索隱鈎深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜而下文即終之以河出圖洛出書聖人則之可見羲聖則圖以揲蓍則書以作龜也及神禹治水時洛復出書禹用之以叙疇則以羲聖所則以揲蓍者爲七稽疑中之筮所則以作龜者爲七稽疑中之卜擇建立卜人乃命卜曰雨霽蒙繹克卜五擇建立筮人乃命筮曰貞悔占用二又恐卜筮比一人或有差錯无由救正故復多其人數俾互究其差錯立是人爲卜筮之官各三人人各有一法所占或皆吉或皆不吉若一不吉二吉則作吉用一吉二不吉則作不吉用故曰占則從二人之言也内傳曰其貞風也其悔山也是以内卦爲貞外卦爲悔又曰貞屯悔豫者八是以本卦爲貞之卦爲悔周易曰利貞不利貞可貞貞疾之類爲悔悔亡其悔乃亡之類皆沿于此蓋伏羲之法而三代時出而充榮之云耳商易孔氏曰古者有歸藏氏今商易名歸藏盖用歸藏氏之易也歸藏者言萬物之歸根復命皆包藏于地也坤爲地歸藏者地之道也故其書以坤爲首說卦曰坤以藏之是也商易之可見者惟此名書及首坤之二端而已其六十四卦之序今皆不可考矣但禮運夫子告子游曰坤乾之等則想其次序首坤次乾文王則以坤不可以首乾故首乾次坤耳以後卦次則復尤從而考也然移其坤乾之次而不易其乾坤之耦則其二二相耦或者亦與周同而次第遠近則不能以盡同亦未可知也周易泰六五帝乙歸妹以祉元吉明夷之六五箕子之明夷利貞歸妹六五帝乙歸妹其君之袂不知其娣之袂艮既濟九三高宗伐鬼方三年克之未濟九四震用伐鬼方三年有賞于大國先儒以爲當時曾占得此爻故舉以爲言鷟按周官太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四大易所謂莫大乎蓍龜者於兹見矣然伏羲卦序首乾次兊次離次震次巽次坎次艮次坤而其别六十亦循此經卦八之次夏易首艮而序不可考商易首坤而序亦不可考其别之從經與否悉皆未聞人掌三易以辨九之名一曰筮更二曰筮咸三曰筮式四曰筮目五曰筮易六曰筮化七曰筮祠八曰筮參九曰筮環以辨吉凶凡國之大事先筴而後卜上春相筴凡國事共凡卜筮之法皆原于伏羲无疑以圓神之蓍求方知之卦易貢之爻皆遵于伏羲无疑蓍之出櫝而握在手謂之闔户信手平分掛揲歸竒謂之闢户一闔一闢謂之變三變而成畫九變而小成則内卦成列十有八變而成卦然後外卦重之三變所成之畫或七或八或九或六謂之四象所得七八則内卦爲貞外卦爲悔所得九六則本卦爲貞之卦爲悔占則從二人之言有大同有吉有龜從筮逆作内吉作外凶者有龜筮共違千人用靜吉用作凶者同于夏而遵伏羲之法從可知矣周易文王卦序周公卦變乾不反爵坤不反對屯反之則蒙矣需反之則矣師反之則比矣小畜反之則矣泰反之則否矣同人反之則大有矣謙豫隨蠱臨觀噬嗑貴剥復无妄大畜頥不反對大過不反支坎不反對離不反對右上經三十卦除坤頤大過坎離六卦之外餘二十四卦皆反之爲十二卦咸恒大壮晉明夷家人睽蹇觧損益夬姤萃升困井革鼎震艮漸歸妹豐旅巽兊渙節中孚小過既濟朱濟右下經三十四卦除中孚小過既濟未濟四卦之外其餘三十卦皆反之爲十五卦鷟曰夫子上下彖言徃來上下升降進退等皆因文王於泰否二卦言小徃大來大徃小來而推拓之也文王取伏羲卦序而雜之皆二二相偶於是因二二相偶之卦體反覆觀之是泰則三大在内三小在外否則三小在内三大在外在内者自外而入内故謂之來在外者自内而出外故謂之徃孔子推拓之言亦如此意其云剛上而柔下者剛畫誠在上柔畫誠在下柔上而剛下者亦然皆以二偶之卦比並觀之而見其有此形體云耳非謂以彼卦變爲此卦以此爻易爲彼爻也若果云爾則是以七八之少隂少陽錯認爲九六之老隂老陽也不亦舛之甚邪且文王孔子於八純卦及不反對不言徃來上下其立言本意昭如矣泰小徃大來否大徃小來卦辭之言徃來者始此夫子又拓言上下進退升降徃來者皆本諸此然文王孔子亦非以泰徃之三隂即爲否來之三隂泰來之三陽即爲否徃之三陽自二卦之反對觀之出而徃外故曰徃入而來内故曰來耳若言今歲三陽即舊歲正月之三陽今歲三隂即舊歲七月之三隂是天地間止有此氣藏在一處待時而出入全無新新相繼者矣自古及今有此理也乎哉今曰泰自歸妹來六徃居四九來居三否自漸來九徃居四六來居三則不惟以爻之變動解畫之安靜而且以四三之一小一大默改文王之三小三大其如聖經之偕馳何需位乎天位以正中也天位五也以訟之反對觀之既得正又居中也訟剛來而得中也以需之反對觀之彼得正又居中此但得中不能得正朱子曰訟卦自遯而來四陽二隂自遯來者十四卦訟即初變之卦剛來居二柔進居三丘氏曰此彖辭言卦變之始鷟則以爲坎之中徃而居五則正中來而居二則得中豈不直截而簡易哉隨剛來而下柔動而說隨本義云自困卦九來居初又自噬嗑九來居五而自既濟來者兼此二變皆剛來隨柔之矣蠱剛上而柔下巽而止蠱薰氏日自賁井既濟來皆剛上而柔下此變卦也非鷟曰以二卦反對觀之蠱上之剛自外來初而下於二三上柔隨初剛自下而上上之柔自上而下先儒又以六子套括之曰否初與隨上相易泰初與蠱上相易者尤非噬嗑柔得中而上行先儒以爲自否變自初上行至五非賁柔來而文剛分剛上而文柔以爲自泰變泰之剛徃上非鷟曰剛柔分之分即分剛上而之柔之分卦言柔離之五後卦言柔離之二五得中而不正二得中而又得正故尤以爲貴无妄剛自外來而爲主於内謂自遯三變非大畜剛上而尚賢謂自大壯四變而上下非鷟曰无妄之剛自大畜之上外來而爲主於内之初大畜之剛以无妄之初上而自尊尚賢以反對而玩象下彖咸柔上剛下謂自於否變非恒剛上柔下謂自於泰變非鷟曰此以反對玩象甚是明白晋順而麗乎大明柔進而上行謂自觀四進而上行至五非明夷家人暌說而麗乎明柔進而上行謂自巽四進而上行至五非鷟曰四卦皆有離體進而上行則喜談之退而下行則不樂道之聖人之重明也如此以四卦反對取義最宜潜玩蹇利西南徃得中也不利東北其道窮也利見大人徃有功也謂震初易五四易三非解利西南徃得衆也其來復吉乃得中也有攸徃夙吉徃有功也謂艮上易二艮二易上者无稽鷟曰此亦甚明損損下益上其道上行謂泰三變上者非益損上益下自上下下謂否四變初者非鷟曰損下益上則損損上益下則益二卦顛倒玩象辭甚明而義甚閎謂自泰否來者何相關涉之有萃聚也順以說剛中而應故聚也升柔以時升巽而順剛中而應是以大亨張氏曰柔指六四徐氏曰解之六二上而爲六四如此言見夫子之言柔升但言四一畫而已五與上皆不言升何其詭經偕聖至如此者哉又以六之之則以爻而釋卦可謂不辨菽麥矣然則經何以不言柔以時降邪曰升則侈言之降則不必言之聖人成人之美盖如此與明夷家人同緫卦變圖乃周公之用九用六也於是一卦可變爲六十四六畫无變卦之无爻者止可謂之畫故易六畫而成卦是也无變者止有七无九有八无六故无變也文王設卦觀象而繫辭于其下者此也易學先儒亦謂一卦可變爲六十四卦誤矣及其揲蓍所得或九或六始名曰爻然後有變一畫變者六卦以下皆以乾坤二卦著明之于下其他六十二卦皆可知已六變夬剥五變大有比四變小畜豫三變履謙二變同人師初變姤復揲得九者剛將變柔揲得六者柔將變剛故言變初變者初九初六也姑以乾坤二卦明之乾之姤坤之復是已九二乾之同人六二坤之師九三乾之履六三坤之謙九四乾之小畜六四坤之豫九五乾之大有六五坤之比上九乾之夬上六坤之剥六十二卦皆放此周公係辭二畫變者十有五卦初上變大過頤初五變鼎屯初四變巽震初三變訟明夷初二變遯臨二上變革蒙二五變離坎二四變家人解二三變无妄升三上變兊艮三五變睽蹇三四變中孚小過四上變需晋四五變大畜五上變大壯觀三畫變者二十卦初二上變咸損初二五變旅節初二四變漸歸妹初二三變否泰初三上變困初三五變未濟既濟初三四變涣豐初五上變恒益初四上變井噬嗑初四五變蠱隨二三上變隨蠱二三五變噬嗑井二三四變益恒二五上變豐涣二四上變既濟未濟二四五變困三五上變歸妹漸三四上變節旅三四五變損咸四五上變泰否四畫變者十五卦初三五上變小過損初二四上變蹇暌初二四五變艮兊初二三上變萃小畜初二三五變晋需初二三四變觀大壯初四五上變升无妄初二五上變解家人初三四上變坎離初三四五變蒙革二四五上變眀夷訟二三五上變震巽二三四上變屯鼎二三四五變頓大過三四五上變臨遂五畫變者六卦初三四五上變師同人初二四五上變履初二三五上變豫小畜初二三四上變比大有初二三四五變剥夫二三四五上變復姤六畫皆變者一卦用九乾之坤用六坤之乾以上周公繫辭止乾坤二用朱子曰卦之一畫變者六二畫變者十五三畫變者二十四畫變者十五五畫變者六六畫皆變者一合之爲六十三并本卦不變者共六十四一卦變成六十四六十四卦變成四千九十六焦贛易林正如此一爻變則占本卦變爻王氏曰本卦爻爲貞之卦爻爲悔二爻當兼用二爻變則占本卦二變爻而以上爻爲主王氏曰當以初變爻爲貞次變爻爲悔作兩節消息之後准此三爻變則占本卦及變卦彖辭以本卦爲貞變卦爲悔按彖辭非可以占變當以先變爻爲貞後二變爻爲悔作三節消息之四爻變則占變卦二不變爻仍以下爻爲主五爻變則占變卦一不變爻王氏曰皆當以先變爻爲貞後老變爻爲悔作四節五節消息之夏氏曰既不變如何用變底爻辭周公爻辭本爲九六之變者設非爲七八之不變者設周易不用七八豈有七八而可冒用九六之辭哉六爻盡變乾坤占二用餘占變卦彖辭按卦辭皆爲七八不變者設豈可用之以占變乾坤占二用可也鷟按朱子據左傳艮之八及貞屯悔豫皆八之之言而然左傳說者以爲用夏商易其用周易者則明言周易然亦不能盡考也卦主占卦之藏必有主書十二辟卦如復姤則以初畫爲主臨遯則以二畫爲主泰否則以三畫爲主大壯觀則以四畫爲主夬剥則以五畫爲主乾坤則以上畫爲主六子重卦如震巽則以第四畫爲主坎離則以第五畫爲主艮兊則以上畫爲主六子合卦如恒益則以初畫爲主既濟未濟則以第二畫爲主咸損則以第三畫爲主震巽艮兊之合无反對如賾大過以上畫爲主中孚小過以第四畫爲主合有反對如隨蠱以初畫爲主漸歸妹以第三畫爲主卦有坎離者主坎離中畫訟困解涣蒙師同人革豐家人賁明夷則皆以二爲主需節屯井蹇比大有暌噬嗑鼎旅晋則皆以五爲主以震巽爲主者主本卦第四畫如豫畜以四爲主升无妄以初爲主以艮兊爲主者主本卦第三畫如謙履以三爲主筮大畜以上爲主坤卦辭後得主坤主上明夷初九主人有言明夷主二暌九二遇主十巷睽主三豐初九遇其配主九四遇其主豐主二无妄剛自外來而爲主於内无妄以初爲主鷟曰春秋之經内魯國外列國故稱内爲我春秋以魯國爲主故也如云齊人宋人陳人伐我面鄙齊人伐我葬我小君之類是已周易亦然凡卦辭爻辭所言我字皆指卦主而言今列于後蒙童蒙求我非我求童蒙二爲卦主故稱我五艮少男故稱童蒙小畜宻雲不雨自我西郊四爲卦主故稱我觀六三觀我生進退四爲卦主故稱我觀四之動作以爲進退巽爲進退頤初九舍爾靈龜觀我朵頤九爲卦主故稱我初處下不當養人之任自爲靈知自養之龜然雖下伏而猶上觀乎上九盖羡上之能養其下而不无舍己以爲人之意益九五有孚惠心勿問元吉有孚惠我德二爲五之正應五當心位言二孚而益之之心不問可知其吉也然二不但孚于九五而惠五之心又孚于初九而惠初九之德初爲卦主故稱我二五應遠故曰惠心初剛實爲二所食又相比近故曰惠德六二亦言受九五之益而又得初九之弗違與此爻辭意正相同此因言五之所應而并言所應之所比彼因言二之所應而并言六二之所比井九三井渫不食爲我心惻五爲卦主故稱我三在兊口之下故雖渫治清潔而不爲人食之象故九五之心爲之惻然憫其不見用于世也盖五三同德但五上體在兊口之上人所食者三下體在兊口之下人所不食九五所以爲之惻然也鼎九二鼎有實我仇有疾不我能即吉五爲卦主故稱我此托爲卦主之言言二之道德實於中乃我之正應好匹也不幸而有氣體失平之疾不我能就我豈可以不徃見之哉士不枉道求見君能屈己下賢所以爲吉也旅九四我心不快五爲卦主當心位故稱我五旅于四之處非正位故心不樂也中孚九二我有好爵吾與爾靡之四爲卦主故稱我又稱吾托爲卦主謂二曰九五剛徤中正有天之尊爵于己在我之上吾與爾二當向慕係戀之也四比五二五同位故告此小過六五宻雲不雨自我西郊四爲卦主故稱我九三蔽五坎之下體象雲宻塞而不過故不雨四爲西在内卦之外故曰郊九四不上合六五何望隂陽之和而成雨哉互先天圖六十四卦每二卦互爲一卦故中層三十二卦左右相同實十六卦中體層三十二卦每二卦又互爲一卦故内層共十六卦四分相同實四卦圖吴先生曰自昔言互體者不過以六畫之四畫互二卦而已未詳其法象之精也今以先天圖觀之互體所成十六卦皆隔八而得縮四而一圖之左邊起乾夬歷八卦而至湀歸妹又歷八卦而至家人既濟又歷八卦而至頤復右邊起姤大過歷八卦而至未濟解又歷八卦而至漸蹇又歷八卦而至剥坤左右各二卦三二卦合六十四卦互體只成十六卦又合十六卦互體只成四卦乾坤既濟未濟也周易始乾坤終既濟未濟以此歟朱氏曰中一層左右各十六卦其下體兩卦相比一循乾一坤八之序其上體十六卦兩周乾一坤八之序可玩其内層下體乾離坎坤爲序其上體乾坎離坤爲序而四周之尤可玩鷟曰夫子雜卦之末章八卦取中層之大過姤夬以其互内層之乾也取中層之頤以其互内層之坤也取中層之漸既濟以其互内層之未濟也取中層之歸妹未濟以其互内層之既濟也不取乾坤以首於篇首故也不取剥復以隂多略之也不取暌解以取未濟歸妹略之也不取家人蹇以取既濟漸略之也乾取三卦坤惟頤既濟惟歸妹未濟惟漸者乾尊故也既未著于後周易終既未之義也夬復殿乎既未之復夫子雜卦之序也夏商周之稱名也雜而不越夫子之稱名也亦雜而不越古易考原卷之三終大明萬暦三十五年歲次丁未上元旦正一嗣教凝誠志道闡玄弘教大真人堂天下道教事張國祥奉㫖校梓
