body:
  text: 夫子曰蓍之德圓而神神以知來又曰與天地相似故不違知周萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛故神無方又曰天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以群分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相蕩凡此皆言伏義蓍數之易也惟其有圓神之蓍數而求天地萬物之理于藏往之卦畫夫然後未來之吉凶悔吝可得而知也故考原之書次之以伏義蓍數之易河圖第一繫辭曰河出圖洛出書聖人則之又曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也鷟曰聖人則河圖所以生蓍則洛書所以作龜因上文言莫大乎蓍龜故兼言則洛書也漢書律曆志引此章天一至行鬼神也六十四字相連班孟堅之後不知何時離逖天一至地十草字在于後章今從程朱正其錯簡此即所謂河圖之數也河中龍馬出于河其背上旋毛有此圓圈如星點然故曰圖以其出于河故曰河出圖凡天下之數起于一成于十不過十數而已加之以一則為十有一加之以十則為二其十由是而百千萬億皆出于十之外者也若河圖之數則不然焉天一為一矣至天三併天一而為四一得其一三得其三而三與一有合至天五又與一三相得而合為九至天七又與一三五相得而合為十六至天九又與一三五七相得而合為二十有五曰五者天數之正曰二十者衍出之數雖曰衍出二十而其實不出天數五之外也地二為二矣至地四則併二而為六二得其二四得其四而二與四有合至地六又與二四相得而合為十二至地八又與二四六相得而合為二十至地十又與二四六八相得而合為三十曰五者地數之正曰二十五者衍出之數雖曰衍出二十五而其實不出乎地數五之外也總天地之數五十有五曰十者天地之正數曰四十五者天地衍出之數而衍出之數實不出乎十數之外不出十數之外而衍出五十有五之數由是天數本竒然陽變而化隂地數本偶然隂變而化陽以此五十五數而完成而變化之屈伸往來其妙無窮以此五十五數而流行也伏義聖人安得不則之以為大衍之數而用以揲蓍求卦也與則之之法見下文大衍第二大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒于扐以象閏五歲再閏故再扐而後掛鷟曰此承上文而言伏羲則河圖之數以揲蓍求卦也河圖天數五衍為二十有五地數五衍為三十矣然猶未盡乎衍之極也故伏羲則河圖而大衍之則又九十有九焉大衍者一與二為三二與三為五三與四為七四與五為九合三五七九為二十有四由是五與六為十一而一居其中又六與七為十三七與八為十五八與九為十七九與十為十九再合三五七九又為二十有四合十一之十十三之十十五之十十七之十十九之十凡為十者五此大衍中之體數也故曰大衍之數五十合前之二十有四與後之二十有四并居中之一共四十有九為大衍中之用數故曰其用四十有九雖衍為九十有九亦不出乎天一至地十之外此其所以為則河圖之衍數而為大衍之極其數也夫子說出一衍字以發河圖之意加一大字以發明伏羲則河圖之意聖筆如化工其妙無窮而簡易易知豈不信哉揲蓍之法取其變有取其辭取其用有取其體五十雖為河圖之大衍然猶為變中之靜用中之體故置之不用四十九者變中之變用中之用故特用之以揲蓍求卦也從一而左右數之皆一三五七九而為天數五乾之純粹精而無隂柔偶戴之駁雜且前後二十有四分二之象也一居于中掛一之象也曰三五七九有四者揲四之象也又三五七九有四者再揲之象也皆出于天機自然之法象而非一毫人力私知得以營為于其間於此見伏羲制作之神妙有非常情所能窺測者連山氏歸藏氏夏商周歷代遵而用之雖雜其序於理不越有以也夫晋人取老莊宗㫖以解大易乃曰四十九蓍者即五十之虛一不用也虛一不用所以象太極也夫太極樞紐造化根抵品彙而理氣之妙合本無時而可離者今乃獨拈一策屏諸無用之櫝中退間於靜則是造化品彙亦有不必樞紐根抵之時而理之與氣亦有時而可離而凡二掛一揲四歸竒皆四十九策之所營太極一策倦勤于櫝中漫不知所統括反不如四十九策之有用其為說也不亦悖乎夫所置之一策與所用之四十九策長短大小彼此如一今信手置下一策即便變器而為道改形而為理尊稱曰太極崇重神妙無與比倫何其僥幸之至而所取用之四十九策失其樞紐别遠根抵專擅勤劬紛紛用事於外而不得與所置一策媲美是何其大不僥幸耶愈見晋人解經之無當且河圖衍數五十有五今大衍之而反少其五又安得謂之大衍哉鷟按漢書五行志劉歆曰伏義受河圖則而畫之八卦是也禹治洪水賜洛書法而陳之洪範是也邵子曰圓者星也歷紀之數其肇于此乎方者土也畫州井地之法其放于此乎蓋圓者河圖之數方者洛書之文故義文因之而造易禹箕叙之而作範也吳先生曰河圖者河有龍馬出而馬皆之旋毛有此十數也洛書者洛有神龜出而龜甲之坼文有此九數也以旋毛如星點之圓圈故曰圖以坼文如字畫之縱橫故曰書河圖之馬不異于凡馬洛書之龜不異于凡龜至今馬背之毛其旋有如星點特其旋無此十數耳至今龜背之甲其坼有如字畫特其坼無此九數耳鄭氏曰河出圖有自然之象洛出書有自然之文河圖洛書鷟曰伏羲則河圖以生蓍則洛書以作龜河圖之則即大衍是也今列圖于左洛書之則未詳其後神禹時洛亦出書禹因之以叙疇成王時陳寶河圖在東序夫子又曰河不出圖與鳳鳥並言則為聖王之禎祥也尚矣天一天三天五天七天九五位相得而各河有合天數二十有五五位者天數五之圖五位也故相得而各有合衍為二十有五衍地二地四地六地八地十五位相得而各數有合地數三十五位者地數五之五位也故相得而各有合衍為三十圖凡天地之數五十有五天數五而已衍出二十合為二十五然未嘗出五數之外地數五而已衍出二十五合為三十亦未嘗出五數之外㧾天地之數五十有五又未嘗出乎天地之數之外不出乎河圖天一至地十之五位共為十數之外而多出五十有五數有若書衍文然者吾故曰河圖衍數鷟曰漢儒釋五位相得而各有合為一六二七三八四九五十之相得各有合果如是則當云十位不當云五位也又當急綴之以天地之數五十有五之凡者言不當更分天數二十有五地數三十也今既分而言之可見天五位承上天數五而言地五位承上地數五而言决不可以十位相得而有合矣此皆漢儒解經之謬不可以不之辨也伏一與二合為三合三五七九為六十有四羲二與三合為則三與四合為河四與五合為圖五與六合十一居中中合前前後后二衍六與七合十十四共四十有九數七與八合十為八與九合十大九與十合十合三五七九為二十衍有四之數圖十一之十十三之十十五之十十七之十十九之十凡為十者五大衍之體數也前後二十有四為四十八一居其中通四十有九者大衍之用數也置其體數不用但用其用數者有掛一分二揲四再揲之法象又出于天數之純無隂偶之駁雜伏羲所以取之以前民用也與鷟曰夫子贊河圖數之妙曰此所以成變化而行鬼神又曰知變化之道者其知神之所為乎又曰神無方又曰隂陽不測之謂神又曰幽贊于神明而生蓍參天兩地而倚數又曰通神明之德皆未有言則之以畫八卦者乃劉歆之妄而先儒誤從之耳故特為此圖以發明夫子之意讀者宜致思焉揲蓍立卦生爻第三蓍之德圓而神七七故圓卦之德方以知八八故方六爻之義易以貢九六則剛柔相易以告人聖人以此洗心退藏於密以此蓍卦六爻洗其憂世之心斂藏其心於靜密之地吉凶與民同患神以知來知以藏往聖人之心未能忘民之患何以能退藏於密哉有蓍之神以知吉凶未至之事有卦之知以藏吉凶一定之理不言爻之貢者統于卦之知可知也使民問筮求卦趨吉避凶故聖人心不復憂而得以退藏于密也其孰能與於此哉古之聰明睿知神武而不殺者夫謂伏羲是以明於天之道而察於民之故是興神物以前民用神物謂蓍聖人以此齊戒以神明其德夫致精曰齊散齊曰戒聖人寓其神于蓍之德寓其明于卦之德非齊戒則不足以致己之神明以神明其德也是故闔户謂之坤握蓍在手闢户謂之乾分蓍以揲一闔一闢謂之變揲蓍之一變往來不窮謂之通蓍數多寡難以拘定見乃謂之象三變蓍見變成有竒以象剛之七偶以象柔之八重以象太剛之九交以象太柔之六曰四象形乃謂之器因象求形多曰物器制而用之謂之法利用出入民咸用之謂之神闔闢變通者蓍之圓象器法民咸用之者蓍之神是故易有太極易揲蓍營度之易也蓍之握分固象户闔闢矣方其在櫝而未啓果四象乎屋棟在上而四方椽桶輻輳子棟是名曰極四十九蓍混然在櫝而一變三變九變十有八變之易森然已具于此特為大大之屋棟非尋常屋棟可比故曰易有太極是生兩儀生是櫝中取出而生也闔户坤儀闢户乾儀兩相合德故曰是生兩儀今邑中二門題曰儀門兩儀生四象生揲蓍所生也四象七八九六所以象剛柔老少少剛七少柔八太剛九太柔六分為老少是為所以示人者故曰兩儀生四象四象生八卦四象各專其一八卦則成列矣舉內八卦則八卦外不言可知矣省文也八卦定吉凶十八變內外八卦具矣然後占者呈卦因可觀象玩占以定吉凶吉凶生大業吉凶既定無疑趨避生出極大之事功是故法象莫大乎天地承言兩儀成象謂乾效法謂坤變通莫大乎四時承言一闔一闢往來不窮所謂揲之以四以象四時懸象著明莫大乎日月承言見乃謂之象所以太剛為日太柔為月崇高莫大乎富貴上句見吉凶此句承言大業既有可致之資又有能致之勢吊民伐罪位天地育萬物孰非大業尤宜問筮備物致用立成器以為天下利莫大乎聖人具蓍物以前民用立卦象而制成物器使天下得以尚占象大業以成惟聰明睿知神武不殺之聖人能之故曰莫大探賾索隱鈎深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜極言蓍龜之神以見聖人之利天下莫大于此下文又申結之是故天生神物聖人則之神物兼上文蓍龜則蓍以河圖則龜以洛書見下天地變化聖人效之變化即變通效天地以闔户闢户效變化以一闔一闢往來不窮天垂象見吉凶聖人象之垂象即懸象見吉凶即蓍明象此以示人吉凶之占終見象定吉凶河出圖洛出書聖人則之則河圖以揲蓍則洛書以作龜終上文天生神物二句鷟曰此篇專言蓍之神然蓍之所以神者以其能取出卦之方知六爻之易貢者以示人而定吉凶之占使人得以生大業此所以神也先儒謂太極為道兩儀為初二畫四象為次四畫其失皆原于邵子今著其圖說于左伏羲六十四卦次序鷟曰夫子言易有太極是生兩儀兩儀生四象四象生八卦未嘗言八生十六十六生三十二三十二生六十四也邵子曰太極既分兩儀立矣陽上交於隂隂下交於陽而四象生矣陽交於隂隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象於是八卦成矣八卦相錯而後萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有斡斡之有枝枝之有葉愈大則愈少愈細則愈繁合之斯為一衍之斯為萬朱子曰畫之所以有竒偶卦之所以三畫而成皆是自然流出不假安排此易學之綱領開卷第一義然古今未見有識者至康節先生始傳先天之學而得其說以為伏羲氏之易也然愚自幼而讀之未免有疑至壯而疑愈深謹疏其疑於下方易易者變易也先儒曰天地間隂陽而已伏羲畫一竒畫以象陽一偶畫以象隂又自一竒一偶相易而為四象為八卦極於六十四卦皆為卦畫之變易既又為蓍數之變易故名之曰易伏羲特未有易字也鷟按此說殊未精夫子此易字承前章四營而成易之易字故其下文曰生四象生八卦定吉凶生大業蓋專言蓍策之易耳若兼言卦畫之易則與伏羲始作八卦之形皆齟齬其詳見下兩儀四象不特此耳下篇乾坤其易之緼乾坤成列而易立乎其中數易字皆與此同又言伏羲時未有易字者非是周官太卜掌三易之法一曰連山夏易也二曰歸藏商易也三曰周易三代皆以易稱沿于羲聖夏商雖别名而其易之稱則不越于羲聖占人掌以八策占八頌以八卦占筮之八故以視吉凶筮人掌三易以辨九筮之名非自周而始定為易字之名也若伏羲時無文故無易字則兩儀四象乾坤艮巽震離坎兊七八九六揲蓍之分二掛一等一切皆是後人增加若伏羲太昊俱是遙稱追號全無一點畫文字雖作神聖竒偉之書全賴後人錫子以易字之名何其少我羲聖之甚一至此哉此因夫子作易者之作字遂為是言殊不知夫子之言作易乃言作周易耳非言其作三易又非言其作伏羲之全易也下文曰其有憂患乎當文王與紂之事邪則其意甚明矣其詳已見序文太極極屋棟也太者至大之謂也韓康伯注曰夫有必始于無故太極生兩儀也太極者無稱之稱不可得而名取有之所極况之太極者也孔穎達疏曰太極謂天地未分之前元氣混而為一即是太初太一也故老子曰道生一即此太極是也又謂混元既分即有天地故曰太極生兩儀即老子云一生二也不言天地而言兩儀指其物體下與四象相對故曰兩儀謂兩體容儀也朱子本義曰一每生兩自然之理也易者隂陽之變太極者其理也鷟曰康伯穎達取老莊宗㫖以解易其說固不足辨已但依其言則道生天地天地又生金木水火金木水火遂生出簡上之八卦矣不亦怪哉若依朱夫子之說則隂陽之變與其所以然之理劈頭即生出簡上之初二畫初二畫又生出簡上之四畫次四畫又生出簡上之次八畫乃不分大小之混隂陽次為二畫乃分大小之别隂陽次為三才之象備然則初畫之隂陽全無大小之别八卦之上畫即可以備乎天道地道人道也哉是固不能無疑者也兩儀先儒曰羲聖畫卦之時先作一畫竒一以象陽作一畫偶一以象隂後人名為兩儀鷟曰吾遍誦十翼夫子之言但云伏羲始作八卦未嘗云伏羲始作兩儀也伏羲始作一畫竒以象陽一畫偶以象隂者出於何經何翼邪出於經何辭翼何篇邪橫圖經八卦其别六十有四圓圖方圖皆然卦下分注曰某卦下某卦上未嘗言初畫竒一偶一分為四又分為八又分為十六又分三十二又分為六十四也卦之六畫長短廣狹彼此如一今初以竒一偶一者而視四象當截為二段視八卦當截為四段視十六當截為八段視三十二當截為十六段視六十四當截為三十二段若不截則陽以竒一負載在上之三十二畫隂以偶一負載在上之三十二畫其不相倫比也明矣如言兩儀神妙一畫可化形三十二以配在上之數則聖人全無此明文堅以此圖為是則聖人之橫圖方圓圖皆當裁截六十四卦之初畫若猶遵修聖人六十四卦之本圖則此圖决非聖人之法畫也四象先儒四竒偶一畫之上各加一竒一偶凡為畫者四以象隂陽之老少鷟曰謂老隂老陽少隂少陽為四象者是也謂四象居八卦初畫之上三畫之下者非也兩儀之儀字承上文闔户闢户之户字而言二户兩儀相匹也四象之象承上文見乃謂之象字而言至此始蓍見于畫七以象少陽八以象少隂九以象老陽六以象老隂故謂四象而夫子曰易有四象所以示也以至此始有畫象以指示人得失動靜而為吉凶悔吝之占不然何以言見乃謂象而四象獨何以言所以示者哉若謂錮于次二之位則乾兊正當者陽離震適當少隂坤艮正當老隂巽坎適當少陽羲聖之易老變而少不變故以左傳三代揲蓍求卦之法考之乾當變為之卦之離兊當變為之卦之震惟巽離獨得其本卦何者少隂不變故也是乾兊本卦因柔推剛而變化而震離既得本卦又得之卦全無一乾一兊但有重震重離也坤當變為之卦之坎艮當變為之卦之巽惟巽坎獨得其本卦何者少陽不變故也是坤艮本卦因剛推柔而變化而巽艮既得本卦又得之卦全無一坤一艮但有重巽重坎也乾兊坤艮四卦亡而震離巽坎四卦重則是四象生四卦安得謂生八卦哉先儒入以竒上加竒陽之純故象老陽竒上加偶者隂雜陽中故象少隂偶上加竒者陽雜隂中故象少陽偶上加偶隂之純故象老隂以逃避老變少不變之難殊不知竒上加竒偶上加偶隂陽之純故特稱老則加至于上六畫皆純者何以稱之哉將自為太上老隂太上老陽也邪為論不求其精務以取快于一時吾無取乎耳八卦夫子言伏羲始作八卦又伏羲之卦下分注曰乾下矣未嘗曰乾下之初共一竒畫與兊離震同乾下之二共一竒畫與兊同者也坤下矣未嘗曰坤下之初共一偶畫與艮坎巽同坤下之二共一偶畫與艮同也又未嘗曰乾下之三始得完全之竒畫方與初二二畫之減殺者異未嘗曰坤下之三始得完全之偶畫方與初二二畫之減殺者異也兊下六卦皆然是則初二三三畫之長短廣狹彼此如一然後得謂之八卦若初畫以四卦共二畫以二卦共長短廣狹彼此不一者决不可謂之八卦其非聖人之法畫豈不明哉十六畫先儒以一每生兩自然之理故每卦之上亦各加一隂一陽而為十六畫然夫子初無是言也不惟無是言而于八卦之下即繼之以定吉凶之語因八卦定吉凶之語逆而推之則知四象生八卦者不徒生內八卦而已外八卦亦是四象所生四象既生此內外之八卦則始謂之十有八變而成卦非單生內八卦而小成之比夫然後可以定吉凶也以此觀之則重卦四五上三畫已畢具于四象生八卦一句之中矣雖欲加倍于八卦而謂十六畫者中間曾無駐足之地也然邵子所謂八分為十六者誠夫子所不言之長語也何其無稽之甚哉三十二畫重卦之四五上三畫畢具于四象生八卦之中故夫子初無三十二畫之言夫子所不言必欲言之豈非長語者乎然則邵子所謂十六分為三十二者不足信亦明矣噫使其言無背違于伏羲之法無乖戾于夫子之㫖猶之可也今以其言稽之外卦之四倍于內卦之三者八外卦之五加于內卦之三者二十四而內卦之三其減于外卦之四與五者亦稱是伏羲之橫方圓圖六畫之形長短廣狹彼此無異則倍者何時而削減者何時而增以凑合三圓哉此不亦背違于伏羲之法乎夫子之㫖以內外八卦皆生于四象故綴之曰八卦定吉凶今八卦之下定吉凶之上橫入以生十六生三十二既非夫子之明文而强生無稽之長語此不亦乖戾于夫子之㫖乎非羲聖之法非孔聖之㫖斷斷乎不足從也六十四畫此六畫卦之上畫宋儒所說生卦之圖惟此一畫六十四卦各有在此不為多在彼不為少但以為三十二畫所分則亦非伏羲之法而有叛于夫子之㫖矣蓋伏義六十四卦初二三四五上六畫俱相若也今謂五畫之上各生竒偶為六畫者六十四則是自此六畫而下五畫減殺三十二乃至四畫減殺四十八三畫減殺五十六二畫減殺六十初畫減殺六十二則是先儒生卦之說一出而使自六畫以下五畫皆不得其所不免破削支離豈得為聖人之法大中之㫖哉今皆復古而祛異說庶不得為聖人之纍也故復載其圖說于後以明伏羲之本法夫子之本意伏羲揲蓍生卦圖坤儀取出續中之著握在手中道人家室之閉其戶然者則謂之坤儀坤靜也禽也此四十九皆之在幃中者屋太極之譽標四方八面背合湊於此也故謂之太極乾儀信手平分掛一揲四歸竒一人家室之開其戶然者則謂之乾儀乾也關也太陽之象揲著而得九者是也九則其象為坰故曰太陽乾十八變皆七者為乾下乾上皆九則乾之坤矣兊三上得八而六初二四五得七為兊下兊上得九六則之艮矣少隂之象揲舊而得八者是也八則離二五得八實三四上得七為離下離上得九六則之坎矣其象為一故坰少隂震初四得七二三五上得八為震下震上得九六則之巽矣少陽之象揲著而得七者是也七則巽初四得八一三五上得七為巽下巽上得九六則之震矣其象為一故曰少陽坎二五得七初三四上得八為坎下坎上得九六則之離矣太隂之象揲著而得六者是也六則艮三上得七初二四五得八為艮下艮上得九六則之兊矣其象為爻故曰太隂坤中八變皆八者為坤下坤上皆六則坤之乾矣經卦之别六十有四皆以此四象求之皆七八則為文王繫辭之卦若得九六則為周公繫辭之爻而一卦可變為六十四卦矣古易考原卷之二
